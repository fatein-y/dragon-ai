<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Pro AI - Gold</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; --dark-gray: #151515; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--black); color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); font-size: 24px; margin-bottom: 5px; }
        p { color: #888; font-size: 12px; margin-bottom: 20px; }
        textarea { width: 100%; height: 160px; background: var(--dark-gray); border: 1px solid #333; border-radius: 12px; color: #fff; padding: 15px; font-size: 16px; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--gold); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 20px; }
        .btn { background: var(--dark-gray); border: 1px solid var(--gold); color: var(--gold); padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Tajawal'; }
        .btn:active { background: var(--gold); color: var(--black); transform: scale(0.98); }
    </style>
</head>
<body>
    <h1>DRAGON PRO</h1>
    <p>صياغة بشرية ملكية</p>
    <textarea id="userInput" placeholder="ضع نصك هنا..."></textarea>
    <div class="grid">
        <button class="btn" onclick="send('corporate')">💼 Corporate</button>
        <button class="btn" onclick="send('academic')">🎓 Academic</button>
        <button class="btn" onclick="send('medical')">⚕️ Medical</button>
        <button class="btn" onclick="send('cyber')">🛡️ Cyber</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function send(mode) {
            const text = document.getElementById('userInput').value.trim();
            if (!text) return alert("الرجاء إدخال نص!");
            tg.sendData(mode + "|" + text);
            tg.close();
        }
    </script>
</body>
</html>
