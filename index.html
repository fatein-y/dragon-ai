<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Hybrid - Golden Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #996515;
            --black: #0a0a0a;
            --dark-gray: #151515;
            --gold-gradient: linear-gradient(145deg, #D4AF37, #996515);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--black);
            color: #fff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--gold);
            font-size: 32px;
            margin: 0;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .header p {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background-color: var(--dark-gray);
            border: 1px solid #333;
            border-radius: 18px;
            color: #fff;
            padding: 18px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            resize: none;
            font-family: 'Tajawal', sans-serif;
            line-height: 1.6;
            text-align: right;
            direction: rtl;
        }

        textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.15);
        }

        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }

        .btn {
            background: var(--dark-gray);
            border: 1px solid #333;
            color: #fff;
            padding: 15px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active {
            transform: scale(0.95);
            background: #222;
        }

        /* زر الأوتو المميز مع تأثير النبض */
        .btn-auto {
            grid-column: span 2;
            background: var(--gold-gradient);
            color: var(--black);
            border: none;
            font-size: 17px;
            box-shadow: 0 5px 20px rgba(153, 101, 21, 0.4);
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        .footer {
            margin-top: auto;
            padding: 20px;
            color: #444;
            font-size: 11px;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* منع مشاكل التكبير في الآيفون */
        input, textarea, button {
            font-size: 16px !important;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>DRAGON HYBRID</h1>
        <p>النسخة الملكية - صياغة بشرية مطلقة</p>
    </div>

    <div class="container">
        <textarea id="userInput" placeholder="أدخل النص هنا.. وسيقوم التنين بإعادة صياغته بأسلوب بشري احترافي"></textarea>

        <div class="grid-options">
            <button class="btn btn-auto" onclick="sendToDragon('auto')">✨ ذكاء تلقائي (Auto Mode)</button>
            <button class="btn" onclick="sendToDragon('corporate')">💼 Corporate</button>
            <button class="btn" onclick="sendToDragon('academic')">🎓 Academic</button>
            <button class="btn" onclick="sendToDragon('medical')">⚕️ Medical</button>
            <button class="btn" onclick="sendToDragon('cyber')">🛡️ Cyber</button>
        </div>
    </div>

    <div class="footer">
        Powered by Dragon Core AI Engine
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // إعدادات التطبيق داخل تليجرام
        tg.expand(); // فتح التطبيق بالكامل
        tg.ready();
        tg.setHeaderColor('#0a0a0a'); // تلوين شريط تليجرام العلوي
        tg.setBackgroundColor('#0a0a0a');

        function sendToDragon(mode) {
            const input = document.getElementById('userInput').value.trim();
            
            if (!input) {
                tg.HapticFeedback.notificationOccurred('error'); // اهتزاز خطأ
                tg.showAlert("الرجاء كتابة نص أولاً!");
                return;
            }

            // تجهيز البيانات للصيغة التي يفهمها البوت mode|text
            const formattedData = mode + "|" + input;

            // اهتزاز تأكيدي (نجاح)
            tg.HapticFeedback.impactOccurred('heavy');
            
            // إرسال البيانات وإغلاق التطبيق
            tg.sendData(formattedData);
            tg.close();
        }

        // جعل التيكست إريا تركز تلقائياً عند الفتح
        window.onload = () => {
            document.getElementById('userInput').focus();
        };
    </script>
</body>
</html>
