<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Pro AI - Golden Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #996515;
            --black: #0f0f0f;
            --dark-gray: #1a1a1a;
            --text-white: #e0e0e0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--black);
            color: var(--text-white);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px;
            border-bottom: 2px solid var(--gold);
            width: 100%;
        }

        .header h1 {
            color: var(--gold);
            font-size: 24px;
            margin: 0;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .main-container {
            width: 100%;
            max-width: 500px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background-color: var(--dark-gray);
            border: 1px solid var(--dark-gold);
            border-radius: 12px;
            color: white;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            resize: none;
        }

        textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
        }

        .modes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .mode-btn {
            background: linear-gradient(145deg, var(--dark-gray), #222);
            border: 1px solid var(--dark-gold);
            color: var(--gold);
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Tajawal', sans-serif;
        }

        .mode-btn:active {
            transform: scale(0.95);
            background: var(--gold);
            color: var(--black);
        }

        .auto-btn {
            grid-column: span 2;
            background: linear-gradient(145deg, var(--gold), var(--dark-gold));
            color: var(--black);
            border: none;
            font-size: 18px;
            margin-top: 5px;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🐉 DRAGON PRO AI</h1>
        <p style="color: var(--dark-gold); font-size: 14px;">النسخة الملكية - صياغة بشرية متطورة</p>
    </div>

    <div class="main-container">
        <textarea id="userInput" placeholder="أدخل النص هنا ليتم تحويله بعناية..."></textarea>

        <div class="modes-grid">
            <button class="mode-btn auto-btn" onclick="sendData('auto')">🤖 ذكاء تلقائي (Auto)</button>
            <button class="mode-btn" onclick="sendData('corporate')">💼 Corporate</button>
            <button class="mode-btn" onclick="sendData('academic')">🎓 Academic</button>
            <button class="mode-btn" onclick="sendData('medical')">⚕️ Medical</button>
            <button class="mode-btn" onclick="sendData('cyber')">🛡️ Cyber</button>
        </div>
    </div>

    <div class="footer-note">
        سيتم خصم 1 نقطة عند كل عملية معالجة
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // يفتح التطبيق على كامل الشاشة

        function sendData(mode) {
            const text = document.getElementById('userInput').value;
            if (!text.trim()) {
                tg.showAlert("الرجاء إدخال نص أولاً!");
                return;
            }
            
            // نرسل البيانات للبوت بالصيغة اللي برمجناها: mode|text
            const payload = mode + "|" + text;
            tg.sendData(payload);
            tg.close();
        }
    </script>
</body>
</html>
